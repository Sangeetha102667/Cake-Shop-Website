        <section id="order">
             <div class="title-text">
                <p>Order Details</p>
                <h1>Precision and Care.</h1>
             </div>
        <header>
            <h1>Order Your Cake Online</h1>
        </header>
        <main>
            <form action="/submit-order" method="POST">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>

                <label for="cake-type">Select Cake Type:</label>
                <select id="cake-type" name="cake_type" required>
                    <option value="chocolate">Chocolate Cake</option>
                    <option value="vanilla">Vanilla Cake</option>
                    <option value="red-velvet">Red Velvet Cake</option>
                    <option value="custom">Custom Design</option>
                </select>

                <label for="size">Cake Size:</label>
                <select id="size" name="size" required>
                    <option value="small">Small (6")</option>
                    <option value="medium">Medium (8")</option>
                    <option value="large">Large (10")</option>
                </select>

                <label for="message">Special Message on Cake:</label>
                <textarea id="message" name="message" rows="3" placeholder="Enter your message here"></textarea>

                <label for="delivery-date">Delivery Date:</label>
                <input type="date" id="delivery-date" name="delivery_date" required>

                <label for="address">Delivery Address:</label>
                <textarea id="address" name="address" rows="3" placeholder="Enter delivery address" required></textarea>

                <button type="submit">Place Order</button>
            </form>
        </main>
        <footer>
            <p>&copy; 2024 Cake Business. All rights reserved.</p>
        </footer>
        </section>

        <script>
			var menuBtn = document.getElementById("menuBtn")
			var sideNav = document.getElementById("sideNav")

			sideNav.style.right = "-250px";

			menuBtn.onclick = function () {
				if (sideNav.style.right == "-250px") {
					sideNav.style.right = "0";
					menu.src = "cake project - 1st Sem/close.png";
				}

					close.src = "cake project - 1st Sem/menu.png";

		</script>
